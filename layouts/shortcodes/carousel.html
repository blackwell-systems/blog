<!-- Carousel shortcode for multiple images -->
<div class="carousel-container" data-carousel-id="{{ .Ordinal }}">
  <div class="carousel-slides">
    {{ range $index, $image := .Params }}
    <div class="carousel-slide {{ if eq $index 0 }}active{{ end }}">
      <img src="{{ $image }}" alt="Evidence screenshot {{ add $index 1 }}" loading="lazy">
    </div>
    {{ end }}
  </div>

  {{ if gt (len .Params) 1 }}
  <button class="carousel-btn carousel-prev" aria-label="Previous image">‹</button>
  <button class="carousel-btn carousel-next" aria-label="Next image">›</button>

  <div class="carousel-dots">
    {{ range $index, $image := .Params }}
    <button class="carousel-dot {{ if eq $index 0 }}active{{ end }}" data-slide="{{ $index }}" aria-label="Go to image {{ add $index 1 }}"></button>
    {{ end }}
  </div>
  {{ end }}
</div>

<style>
.carousel-container {
  position: relative;
  margin: 2rem 0;
  background: rgba(37, 38, 39, 0.5);
  border-radius: 8px;
  overflow: hidden;
  max-width: 100%;
}

.carousel-slides {
  position: relative;
  width: 100%;
  min-height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.carousel-slide {
  display: none;
  width: 100%;
  padding: 1.5rem;
}

.carousel-slide.active {
  display: flex;
  justify-content: center;
  align-items: center;
}

.carousel-slide img {
  max-width: 100%;
  max-height: 600px;
  height: auto;
  border-radius: 4px;
  cursor: zoom-in;
}

.carousel-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(45, 55, 72, 0.8);
  color: #f8f8ff;
  border: 2px solid #5B8AAF;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  font-size: 2rem;
  line-height: 1;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
}

.carousel-btn:hover {
  background: rgba(45, 55, 72, 1);
  border-color: #63b3ed;
  transform: translateY(-50%) scale(1.1);
}

.carousel-prev {
  left: 1rem;
}

.carousel-next {
  right: 1rem;
}

.carousel-dots {
  position: absolute;
  bottom: 1rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 0.5rem;
  z-index: 10;
}

.carousel-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: rgba(107, 114, 128, 0.5);
  border: 2px solid #6b7280;
  cursor: pointer;
  transition: all 0.2s;
  padding: 0;
}

.carousel-dot:hover {
  background: rgba(107, 114, 128, 0.8);
}

.carousel-dot.active {
  background: #5B8AAF;
  border-color: #5B8AAF;
}
</style>

<script>
(function() {
  const container = document.querySelector('[data-carousel-id="{{ .Ordinal }}"]');
  if (!container) return;

  const slides = container.querySelectorAll('.carousel-slide');
  const prevBtn = container.querySelector('.carousel-prev');
  const nextBtn = container.querySelector('.carousel-next');
  const dots = container.querySelectorAll('.carousel-dot');
  let currentSlide = 0;

  function showSlide(index) {
    slides.forEach(slide => slide.classList.remove('active'));
    dots.forEach(dot => dot.classList.remove('active'));

    currentSlide = (index + slides.length) % slides.length;
    slides[currentSlide].classList.add('active');
    dots[currentSlide].classList.add('active');
  }

  if (prevBtn) {
    prevBtn.addEventListener('click', () => showSlide(currentSlide - 1));
  }

  if (nextBtn) {
    nextBtn.addEventListener('click', () => showSlide(currentSlide + 1));
  }

  dots.forEach(dot => {
    dot.addEventListener('click', (e) => {
      const slideIndex = parseInt(e.target.dataset.slide);
      showSlide(slideIndex);
    });
  });

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (!container.matches(':hover')) return;

    if (e.key === 'ArrowLeft') {
      showSlide(currentSlide - 1);
    } else if (e.key === 'ArrowRight') {
      showSlide(currentSlide + 1);
    }
  });

  // Click to enlarge (reuse mermaid modal if available)
  slides.forEach(slide => {
    const img = slide.querySelector('img');
    img.addEventListener('click', () => {
      // Simple zoom - open in new window as fallback
      const modal = document.createElement('div');
      modal.className = 'carousel-modal';
      modal.innerHTML = `
        <div class="carousel-modal-content">
          <img src="${img.src}" alt="${img.alt}">
          <button class="carousel-modal-close">×</button>
        </div>
      `;

      const style = document.createElement('style');
      style.textContent = `
        .carousel-modal {
          display: flex;
          position: fixed;
          z-index: 9999;
          top: 0;
          left: 0;
          width: 100vw;
          height: 100vh;
          background: rgba(0, 0, 0, 0.95);
          align-items: center;
          justify-content: center;
          cursor: zoom-out;
        }
        .carousel-modal-content {
          max-width: 95vw;
          max-height: 95vh;
          position: relative;
        }
        .carousel-modal-content img {
          max-width: 95vw;
          max-height: 95vh;
          width: auto;
          height: auto;
        }
        .carousel-modal-close {
          position: fixed;
          top: 1rem;
          right: 1rem;
          color: #f8f8ff;
          font-size: 2rem;
          font-weight: bold;
          cursor: pointer;
          background: rgba(45, 55, 72, 0.8);
          width: 40px;
          height: 40px;
          border-radius: 50%;
          display: flex;
          align-items: center;
          justify-content: center;
          border: 2px solid #80AADD;
        }
        .carousel-modal-close:hover {
          background: rgba(45, 55, 72, 1);
          border-color: #63b3ed;
        }
      `;

      document.head.appendChild(style);
      document.body.appendChild(modal);

      const close = () => {
        document.body.removeChild(modal);
        document.head.removeChild(style);
      };

      modal.addEventListener('click', close);
      modal.querySelector('.carousel-modal-close').addEventListener('click', close);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') close();
      }, { once: true });
    });
  });
})();
</script>
